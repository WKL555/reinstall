name: Build and Release Debian 13 UEFI Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME: debian-13-uefi-minimal
  DEBIAN_VERSION: trixie

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-utils parted dosfstools btrfs-progs grub-efi-amd64-bin arch-install-scripts

      - name: Create blank disk image
        run: |
          qemu-img create -f raw ${{ env.IMAGE_NAME }}.img 3G

      - name: Partition disk image (GPT + EFI + Btrfs)
        run: |
          parted -s ${{ env.IMAGE_NAME }}.img mklabel gpt
          parted -s ${{ env.IMAGE_NAME }}.img mkpart primary fat32 1MiB 101MiB
          parted -s ${{ env.IMAGE_NAME }}.img set 1 esp on
          parted -s ${{ env.IMAGE_NAME }}.img mkpart primary btrfs 101MiB 100%

          sudo losetup -Pf ${{ env.IMAGE_NAME }}.img
          LOOP_DEV=$(sudo losetup -j ${{ env.IMAGE_NAME }}.img | cut -d: -f1)
          echo "LOOP_DEV=$LOOP_DEV" >> $GITHUB_ENV

          sudo mkfs.fat -F32 ${LOOP_DEV}p1
          sudo mkfs.btrfs -f ${LOOP_DEV}p2

      - name: Mount partitions and debootstrap base system
        run: |
          sudo mount -o compress=zstd,noatime ${LOOP_DEV}p2 /mnt
          sudo mkdir -p /mnt/boot/efi
          sudo mount ${LOOP_DEV}p1 /mnt/boot/efi

          # 仅安装最基础的系统，不带任何额外软件包（避免配置阶段出错）
          sudo debootstrap --arch amd64 --variant=minbase \
            ${{ env.DEBIAN_VERSION }} /mnt https://deb.debian.org/debian

          # 生成 fstab
          sudo genfstab -U /mnt | sudo tee /mnt/etc/fstab

      - name: Configure system inside chroot
        run: |
          # 挂载虚拟文件系统
          sudo mount --bind /dev /mnt/dev
          sudo mount --bind /proc /mnt/proc
          sudo mount --bind /sys /mnt/sys

          # 写入 chroot 配置脚本
          cat > /tmp/chroot-script.sh << 'EOF'
          #!/bin/bash
          set -e

          # 设置环境变量避免交互式提示
          export DEBIAN_FRONTEND=noninteractive

          # 更新源并安装内核、引导程序和必要工具
          apt-get update
          apt-get install -y --no-install-recommends \
            linux-image-amd64 \
            grub-efi-amd64 \
            systemd-resolved \
            systemd-timesyncd \
            curl \
            btrfs-progs \
            dosfstools \
            systemd-sysv

          # 设置时区
          ln -sf /usr/share/zoneinfo/Etc/UTC /etc/localtime

          # 设置主机名
          echo "debian-minimal" > /etc/hostname

          # 配置 locales
          echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
          locale-gen
          update-locale LANG=en_US.UTF-8

          # 设置 root 密码（可选，默认 "debian"）
          echo "root:debian" | chpasswd

          # 允许 root SSH 登录（可选）
          sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

          # 启用 systemd-networkd 和 resolved
          systemctl enable systemd-networkd
          systemctl enable systemd-resolved

          # 安装 GRUB UEFI 引导
          grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=Debian --removable --no-nvram
          update-grub

          # 清理 apt 缓存
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          EOF

          sudo chmod +x /tmp/chroot-script.sh
          sudo cp /tmp/chroot-script.sh /mnt/tmp/
          sudo chroot /mnt /tmp/chroot-script.sh

          # 卸载虚拟文件系统
          sudo umount /mnt/dev
          sudo umount /mnt/proc
          sudo umount /mnt/sys

      - name: Unmount and detach loop device
        if: always()
        run: |
          sudo umount -R /mnt || true
          sudo losetup -d $LOOP_DEV || true

      - name: Compress image
        run: |
          qemu-img convert -f raw -O qcow2 ${{ env.IMAGE_NAME }}.img ${{ env.IMAGE_NAME }}.qcow2
          xz -9 -k ${{ env.IMAGE_NAME }}.img
          mv ${{ env.IMAGE_NAME }}.img.xz ${{ env.IMAGE_NAME }}.img.xz

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.IMAGE_NAME }}.qcow2
            ${{ env.IMAGE_NAME }}.img.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
